name: Build YVL APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Check Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos 2>&1 || true

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/yvl-music-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: yvl-music-apk
          path: build/app/outputs/flutter-apk/yvl-music-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: YVL Music v1.0.${{ github.run_number }}
          body: |
            ## YVL Music App

            Auto-built release APK from commit ${{ github.sha }}

            ### Install
            1. Download `yvl-music-release.apk` below
            2. On your Android phone: Settings → Security → Unknown sources → Enable
            3. Open the APK file and install

            ### What's included
            - JioSaavn streaming (3-endpoint fallback)
            - 8 synced-lyrics modes (Line, Word, Char, Wave, Neon, Cinema, Float, Pulse)
            - Playlists, liked songs, downloads
            - Rainbow / per-screen / custom accent themes
            - Background audio playback
          files: build/app/outputs/flutter-apk/yvl-music-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
