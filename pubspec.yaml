name: yvl
description: YVL Music — JioSaavn streaming with synced lyrics, playlists, and background playback.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.40
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  http: ^1.2.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
