name: yvl
description: YVL Music — JioSaavn streaming with synced lyrics, playlists, and background playback.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.40
  audio_service: ^0.18.14
  just_audio_background: ^0.0.1-beta.14
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  http: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
